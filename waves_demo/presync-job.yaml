apiVersion: batch/v1
kind: Job
metadata:
  name: presync-check
  namespace: default
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
      - name: pre-check
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "PreSync Hook: Running Pre-deployments checks..."
          echo "Checking environment is ready"
          sleep 3
          echo "Pre-Check passed! Safe to deply"
      restartPolicy: Never
  backoffLimit: 1